<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phikra - We think, therefore You are.</title>
    <style>
        :root {
            --phikra-bg: #272727;
            --phikra-text: #E7D9D6;
            --phikra-text-bright: #ECE0DD;
            --phikra-red: #DF0841;
            --phikra-red-deep: #971535;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, Segoe UI, Arial, sans-serif;
            text-align: center;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background-color: var(--phikra-bg);
            color: var(--phikra-text);
            -webkit-font-smoothing: antialiased;
        }

        h1 {
            margin: 0 0 0.75rem;
            font-size: clamp(1.75rem, 5vw, 2.25rem);
            font-weight: 700;
            color: var(--phikra-text-bright);
            letter-spacing: -0.02em;
        }

        h1::after {
            content: "";
            display: block;
            width: 3rem;
            height: 3px;
            margin: 1rem auto 0;
            background: linear-gradient(90deg, var(--phikra-red-deep), var(--phikra-red));
            border-radius: 2px;
        }

        p {
            margin: 0;
            font-size: 1.125rem;
            color: var(--phikra-text);
            opacity: 0.92;
        }

        ::selection {
            background: var(--phikra-red-deep);
            color: var(--phikra-text-bright);
        }
    </style>
</head>
<body>
        <h1>Welcome to Phikra</h1>
        <p>Coming soon 🚀</p>
</body>
</html>
